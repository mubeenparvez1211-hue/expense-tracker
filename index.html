<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Expense Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary-blue: #1a73e8; --success-green: #25D366; --bg-gray: #f8f9fa; }
        body { background-color: var(--bg-gray); font-family: 'Inter', system-ui, sans-serif; }
        .hero-card { 
            background: linear-gradient(135deg, var(--primary-blue), #0d47a1); 
            color: white; border-radius: 20px; padding: 30px; margin-bottom: -40px;
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2);
        }
        .content-card { 
            background: white; border-radius: 20px; padding: 60px 20px 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn-action { border-radius: 12px; padding: 12px; font-weight: 600; transition: transform 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        .txn-row { border-bottom: 1px solid #eee; padding: 12px 0; }
        .txn-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="container py-4" style="max-width: 500px;">
    <div class="hero-card text-center position-relative" style="z-index: 2;">
        <p class="small text-uppercase mb-1 opacity-75">Business Balance</p>
        <h1 class="display-5 fw-bold mb-0" id="totalAmt">₹0.00</h1>
        <div class="mt-3">
            <label class="btn btn-light btn-sm fw-bold px-3">
                📂 Import Bank PDF
                <input type="file" id="pdfFile" accept="application/pdf" hidden>
            </label>
        </div>
    </div>

    <div class="content-card">
        <div class="row g-2 mb-3">
            <div class="col-7"><input type="number" id="manualAmt" class="form-control" placeholder="Amount ₹"></div>
            <div class="col-5"><input type="date" id="manualDate" class="form-control"></div>
        </div>
        <button class="btn btn-primary w-100 btn-action mb-4" onclick="addManual()">Save Transaction</button>

        <div class="d-grid gap-2 mb-4">
            <button class="btn btn-success btn-action" style="background: var(--success-green); border: none;" onclick="sharePDF()">
                📤 Share to WhatsApp
            </button>
            <button class="btn btn-link btn-sm text-danger" onclick="clearData()">Clear All Records</button>
        </div>

        <h6 class="fw-bold text-muted mb-3 small text-uppercase">Recent Transactions</h6>
        <div id="txnList">
            </div>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    let db = JSON.parse(localStorage.getItem('pro_tracker_v2')) || [];
    document.getElementById('manualDate').valueAsDate = new Date();

    // PDF Import Logic
    document.getElementById('pdfFile').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            try {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    text += (await page.getTextContent()).items.map(s => s.str).join(" ");
                }
                const pattern = /(?:\₹|Rs|INR)?\s?([\d,]+\.\d{2}|[\d,]{3,})/g;
                let match;
                while ((match = pattern.exec(text)) !== null) {
                    let val = parseFloat(match[1].replace(/,/g, ''));
                    if (!isNaN(val) && val > 5 && val !== 2026) {
                        db.unshift({ id: Date.now() + Math.random(), amt: val, date: new Date().toLocaleDateString('en-IN') });
                    }
                }
                render();
            } catch (err) { alert("Please use an unlocked PDF."); }
        };
        reader.readAsArrayBuffer(file);
    };

    function addManual() {
        const a = document.getElementById('manualAmt').value;
        const d = document.getElementById('manualDate').value;
        if (!a || !d) return alert("Missing data");
        db.unshift({ id: Date.now(), amt: parseFloat(a), date: d });
        document.getElementById('manualAmt').value = '';
        render();
    }

    function render() {
        localStorage.setItem('pro_tracker_v2', JSON.stringify(db));
        const list = document.getElementById('txnList');
        let total = 0;
        list.innerHTML = db.map(t => {
            total += t.amt;
            return `<div class="txn-row d-flex justify-content-between align-items-center">
                <div><span class="fw-bold">₹${t.amt.toLocaleString('en-IN')}</span><br><small class="text-muted">${t.date}</small></div>
                <button class="btn btn-sm text-danger" onclick="del(${t.id})">✕</button>
            </div>`;
        }).join('') || '<p class="text-center text-muted py-4">No data available</p>';
        document.getElementById('totalAmt').innerText = `₹${total.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
    }

    function del(id) { db = db.filter(x => x.id !== id); render(); }
    function clearData() { if(confirm("Reset all?")) { db = []; render(); } }

    async function sharePDF() {
        if (db.length === 0) return alert("No data");
        const doc = new jsPDF();
        let sum = 0;
        doc.setFontSize(20); doc.text("Business Statement", 20, 20);
        doc.setFontSize(12); let y = 40;
        db.forEach(t => {
            doc.text(`${t.date}  -  INR ${t.amt.toLocaleString('en-IN')}`, 20, y);
            sum += t.amt; y += 10;
        });
        doc.text(`Total: INR ${sum.toLocaleString('en-IN')}`, 20, y + 10);
        const file = new File([doc.output('blob')], "Statement.pdf", { type: "application/pdf" });
        if (navigator.share) await navigator.share({ files: [file], title: 'Statement' });
        else window.open(URL.createObjectURL(file));
    }
    render();
</script>
</body>
</html>
