<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariyam's Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary-blue: #1a73e8; --bg-gray: #f8f9fa; }
        body { background-color: var(--bg-gray); font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .hero-card { 
            background: linear-gradient(135deg, var(--primary-blue), #0d47a1); 
            color: white; border-radius: 0 0 25px 25px; padding: 40px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .content-card { 
            background: white; border-radius: 20px; padding: 25px; 
            margin-top: -30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .date-group-header { 
            background: #eef2f7; padding: 8px 15px; border-radius: 8px;
            font-size: 0.8rem; font-weight: bold; color: #555; margin-top: 20px;
        }
        .txn-row { border-bottom: 1px solid #f8f9fa; padding: 12px 10px; background: white; }
        .btn-edit { color: var(--primary-blue); font-size: 0.85rem; border: none; background: none; font-weight: 600; }
        .btn-delete { color: #dc3545; font-size: 0.85rem; border: none; background: none; }
        .btn-share { border-radius: 10px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="hero-card text-center">
    <p class="small text-uppercase mb-1 opacity-75">Cumulative Expense</p>
    <h1 class="display-4 fw-bold mb-0" id="grandTotal">₹0.00</h1>
    <p class="small mt-2 mb-0 opacity-75" id="stats">0 Records Total</p>
</div>

<div class="container" style="max-width: 500px;">
    <div class="content-card mb-4">
        <h6 class="fw-bold small text-uppercase text-muted mb-3">Add / Edit Entry</h6>
        <div class="row g-2 mb-3">
            <div class="col-7"><input type="number" id="amtIn" class="form-control shadow-sm" placeholder="Amount ₹"></div>
            <div class="col-5"><input type="date" id="dateIn" class="form-control shadow-sm"></div>
        </div>
        <button class="btn btn-primary w-100 fw-bold mb-4 shadow-sm" onclick="handleSave()">💾 Save Transaction</button>

        <h6 class="fw-bold small text-uppercase text-muted mb-2">Share PDF Statement</h6>
        <div class="d-flex gap-2 mb-2">
            <button class="btn btn-success btn-share flex-grow-1" style="background:#25D366; border:none;" onclick="generatePDF('today')">Today</button>
            <button class="btn btn-success btn-share flex-grow-1" style="background:#128C7E; border:none;" onclick="generatePDF('all')">All History</button>
        </div>
        <button class="btn btn-outline-secondary w-100 btn-sm mb-3" onclick="promptCustomShare()">Select Specific Date</button>
        
        <hr>
        <button class="btn btn-link btn-sm text-danger w-100" onclick="resetDB()">Reset All Data</button>
    </div>

    <div id="history"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let transactions = JSON.parse(localStorage.getItem('mariyam_final_db')) || [];
    let editId = null;

    // Set default date
    document.getElementById('dateIn').valueAsDate = new Date();

    function handleSave() {
        const a = document.getElementById('amtIn');
        const d = document.getElementById('dateIn');
        if (!a.value || !d.value) return alert("Please enter amount and date");

        if (editId) {
            const idx = transactions.findIndex(t => t.id === editId);
            transactions[idx].amt = parseFloat(a.value);
            transactions[idx].date = d.value;
            editId = null;
        } else {
            transactions.push({ id: Date.now(), amt: parseFloat(a.value), date: d.value });
        }
        a.value = '';
        render();
    }

    function render() {
        transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('mariyam_final_db', JSON.stringify(transactions));
        
        const container = document.getElementById('history');
        let total = 0, html = "", lastDate = "";

        transactions.forEach(t => {
            total += t.amt;
            if (t.date !== lastDate) {
                const options = { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' };
                html += `<div class="date-group-header">${new Date(t.date).toLocaleDateString('en-IN', options)}</div>`;
                lastDate = t.date;
            }
            html += `<div class="txn-row d-flex justify-content-between align-items-center">
                <span class="fw-bold">₹${t.amt.toLocaleString('en-IN', {minimumFractionDigits: 2})}</span>
                <div>
                    <button class="btn-edit me-2" onclick="startEdit(${t.id})">Edit</button>
                    <button class="btn-delete" onclick="remove(${t.id})">Delete</button>
                </div>
            </div>`;
        });

        container.innerHTML = html || '<p class="text-center text-muted py-5">No Transactions Found</p>';
        document.getElementById('grandTotal').innerText = `₹${total.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
        document.getElementById('stats').innerText = `${transactions.length} Records Total`;
    }

    function startEdit(id) {
        const t = transactions.find(x => x.id === id);
        document.getElementById('amtIn').value = t.amt;
        document.getElementById('dateIn').value = t.date;
        editId = id;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function remove(id) {
        if(confirm("Remove this entry?")) {
            transactions = transactions.filter(x => x.id !== id);
            render();
        }
    }

    function resetDB() {
        if(confirm("Clear everything? This cannot be undone.")) {
            transactions = [];
            render();
        }
    }

    function promptCustomShare() {
        const date = prompt("Enter date to share (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        if (date) generatePDF('custom', date);
    }

    async function generatePDF(mode, customDate = null) {
        let list = [];
        const todayStr = new Date().toISOString().split('T')[0];

        if (mode === 'today') {
            list = transactions.filter(t => t.date === todayStr);
        } else if (mode === 'custom') {
            list = transactions.filter(t => t.date === customDate);
        } else {
            list = transactions;
        }

        if (list.length === 0) return alert("No transactions found for this date.");

        const doc = new jsPDF();
        let sum = 0;
        doc.setFontSize(18);
        doc.setTextColor(26, 115, 232);
        doc.text(`Business Statement (${mode.toUpperCase()})`, 20, 20);
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Generated: ${new Date().toLocaleString('en-IN')}`, 20, 28);
        doc.line(20, 32, 190, 32);

        let y = 45;
        doc.setTextColor(0);
        list.forEach(t => {
            if (y > 275) { doc.addPage(); y = 20; }
            doc.text(`${t.date}`, 20, y);
            doc.text(`INR ${t.amt.toLocaleString('en-IN')}`, 100, y);
            sum += t.amt;
            y += 10;
        });

        doc.line(20, y, 190, y);
        doc.setFontSize(14);
        doc.text(`TOTAL FOR PERIOD: INR ${sum.toLocaleString('en-IN')}`, 20, y + 12);
        
        const blob = doc.output('blob');
        const file = new File([blob], "Business_Statement.pdf", { type: "application/pdf" });
        
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Business Report' });
        } else {
            window.open(URL.createObjectURL(blob));
        }
    }

    // Initial load
    render();
</script>
</body>
</html>
