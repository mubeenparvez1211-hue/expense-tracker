<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 15px; }
        .app-card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: white; }
        .total-box { background: #1a73e8; color: white; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .btn-share { background: #25D366; color: white; border: none; font-weight: bold; }
        .btn-share:hover { background: #128C7E; color: white; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container" style="max-width: 500px;">
    <h3 class="text-center fw-bold mb-4">Expense Tracker</h3>

    <div class="total-box">
        <small>Total Balance</small>
        <h2 class="fw-bold mb-0" id="totalDisplay">₹0.00</h2>
    </div>

    <div class="card app-card p-4 mb-3">
        <div class="row g-2">
            <div class="col-7">
                <label class="small fw-bold">Amount (₹)</label>
                <input type="number" id="amt" class="form-control" placeholder="0.00">
            </div>
            <div class="col-5">
                <label class="small fw-bold">Date</label>
                <input type="date" id="txnDate" class="form-control">
            </div>
        </div>
        <button class="btn btn-primary w-100 mt-3 py-2 fw-bold" onclick="addEntry()">➕ Add Entry</button>
    </div>

    <div class="d-grid gap-2 mb-4">
        <button class="btn btn-share py-3" onclick="sharePDF()">📤 Share Statement to WhatsApp</button>
        <button class="btn btn-outline-danger btn-sm" onclick="clearAll()">Reset All Data</button>
    </div>

    <div class="card app-card overflow-hidden">
        <div id="displayList"></div>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let transactions = JSON.parse(localStorage.getItem('et_data')) || [];

    document.getElementById('txnDate').valueAsDate = new Date();

    function addEntry() {
        const amt = document.getElementById('amt').value;
        const date = document.getElementById('txnDate').value;
        if (!amt || !date) return alert("Enter amount and date");

        transactions.unshift({ id: Date.now(), amount: parseFloat(amt), date: date });
        transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('et_data', JSON.stringify(transactions));
        document.getElementById('amt').value = '';
        render();
    }

    function render() {
        const list = document.getElementById('displayList');
        const totalDisplay = document.getElementById('totalDisplay');
        let total = 0;

        list.innerHTML = transactions.map(item => {
            total += item.amount;
            return `
                <div class="list-item">
                    <div>
                        <strong>₹${item.amount.toLocaleString('en-IN')}</strong><br>
                        <small class="text-muted">${item.date}</small>
                    </div>
                    <button class="btn btn-sm text-danger" onclick="deleteItem(${item.id})">✕</button>
                </div>
            `;
        }).join('') || '<p class="p-4 text-center text-muted">No records</p>';

        totalDisplay.innerText = `₹${total.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
    }

    function deleteItem(id) {
        transactions = transactions.filter(i => i.id !== id);
        localStorage.setItem('et_data', JSON.stringify(transactions));
        render();
    }

    function clearAll() {
        if(confirm("Clear all?")) { transactions = []; localStorage.setItem('et_data', JSON.stringify(transactions)); render(); }
    }

    async function sharePDF() {
        if (transactions.length === 0) return alert("No data to share.");
        
        const doc = new jsPDF();
        let total = 0;
        doc.text("Expense Tracker Statement", 20, 20);
        doc.setFontSize(10);
        doc.text(`Generated: ${new Date().toLocaleDateString()}`, 20, 28);
        doc.line(20, 32, 190, 32);

        let y = 45;
        transactions.forEach(t => {
            doc.text(`${t.date}`, 20, y);
            doc.text(`INR ${t.amount.toFixed(2)}`, 100, y);
            total += t.amount;
            y += 10;
        });

        doc.line(20, y, 190, y);
        doc.setFontSize(14);
        doc.text(`Total Sum: INR ${total.toLocaleString('en-IN')}`, 20, y + 10);

        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], "Statement.pdf", { type: "application/pdf" });

        // Check if browser supports sharing files (WhatsApp Sharing)
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({
                    files: [file],
                    title: 'Expense Statement',
                    text: 'Here is my transaction statement.'
                });
            } catch (err) {
                // Fallback for local files
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Statement.pdf";
                a.click();
            }
        } else {
            // Standard download fallback
            const url = URL.createObjectURL(pdfBlob);
            window.open(url, '_blank');
        }
    }

    render();
</script>
</body>
</html>
